<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hassam Shabbir — SXO, AIO & GEO Strategist. Psychology-first content that wins in AI search." />
  <title>Hassam Shabbir · SXO Strategist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ─────────────── Hassam Shabbir — Portfolio v2 ─────────────── */

:root {
  --signal: #fcd029;
  --signal-soft: #fde575;
  --signal-deep: #d4a900;
  --navy: #0a1628;
  --navy-deep: #050b16;
  --navy-mid: #0f1d33;
  --ink: #0a0a0a;
  --paper: #f5f5f0;
  --paper-mute: #c7c8cc;
  --mute: rgba(245, 245, 240, 0.55);
  --line: rgba(245, 245, 240, 0.08);
  --glass: rgba(255, 255, 255, 0.04);
  --glass-strong: rgba(255, 255, 255, 0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--navy-deep);
  color: var(--paper);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

body {
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(252, 208, 41, 0.10), transparent 70%),
    radial-gradient(ellipse 70% 50% at 90% 30%, rgba(10, 22, 40, 0.6), transparent 70%),
    radial-gradient(ellipse 60% 40% at 10% 70%, rgba(252, 208, 41, 0.04), transparent 70%),
    linear-gradient(180deg, #050b16 0%, #000 100%);
  min-height: 100vh;
}

.display {
  font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 0.95;
}
.mono {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}

/* Custom scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: var(--signal); border: 3px solid #000; border-radius: 999px; }

/* ─────────────── Particle canvas ─────────────── */
.neural-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.55;
}

/* ─────────────── Layout shell ─────────────── */
.shell {
  position: relative;
  z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 48px;
}
@media (max-width: 768px) { .shell { padding: 0 20px; } }

/* ─────────────── Neural Nav ─────────────── */
.nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px;
  background: rgba(10, 11, 16, 0.7);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
              inset 0 0.5px 0 rgba(255, 255, 255, 0.06);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 8px 10px;
  border-right: 0.5px solid rgba(255, 255, 255, 0.06);
  margin-right: 4px;
}
.nav-brand-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--signal);
  box-shadow: 0 0 12px var(--signal), 0 0 0 2px rgba(252, 208, 41, 0.15);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 12px var(--signal), 0 0 0 2px rgba(252, 208, 41, 0.15); }
  50% { box-shadow: 0 0 24px var(--signal), 0 0 0 5px rgba(252, 208, 41, 0.05); }
}
.nav-brand-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
}

.nav-link {
  position: relative;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(245, 245, 240, 0.65);
  border-radius: 999px;
  cursor: pointer;
  transition: color 0.2s, background 0.2s;
  text-decoration: none;
  white-space: nowrap;
}
.nav-link:hover { color: var(--paper); background: rgba(255, 255, 255, 0.04); }
.nav-link.active { color: var(--ink); background: var(--signal); }

.nav-cta {
  margin-left: 6px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  background: var(--paper);
  color: var(--ink);
  border-radius: 999px;
  cursor: pointer;
  border: 0;
  font-family: inherit;
  transition: transform 0.2s, background 0.2s;
}
.nav-cta:hover { transform: translateY(-1px); background: var(--signal); }

@media (max-width: 900px) {
  .nav-link:not(.always) { display: none; }
  .nav-brand-name { display: none; }
}

/* ─────────────── Side Social Rail ─────────────── */
.side-rail {
  position: fixed;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 90;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

.side-rail::after {
  content: '';
  width: 1px;
  height: 60px;
  background: linear-gradient(180deg, var(--signal), transparent);
  margin-top: 6px;
}

.side-rail a {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 11, 16, 0.65);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  color: rgba(245, 245, 240, 0.7);
  transition: all 0.25s cubic-bezier(0.3, 0.7, 0.4, 1);
  position: relative;
}
.side-rail a:hover {
  color: var(--ink);
  background: var(--signal);
  border-color: var(--signal);
  transform: translateX(4px) scale(1.08);
  box-shadow: 0 6px 24px rgba(252, 208, 41, 0.4);
}
.side-rail a svg { width: 16px; height: 16px; }

@media (max-width: 1100px) { .side-rail { display: none; } }

/* ─────────────── Floating WhatsApp ─────────────── */
.whatsapp-fab {
  position: fixed;
  right: 22px;
  bottom: 22px;
  z-index: 95;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px 12px 14px;
  background: #25d366;
  color: #fff;
  border-radius: 999px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  text-decoration: none;
  box-shadow: 0 10px 32px rgba(37, 211, 102, 0.4);
  transition: transform 0.25s, box-shadow 0.25s;
  border: 0.5px solid rgba(255, 255, 255, 0.2);
}
.whatsapp-fab:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 14px 40px rgba(37, 211, 102, 0.55);
}
.whatsapp-fab .wa-icon {
  width: 28px; height: 28px;
  background: #fff;
  color: #25d366;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.whatsapp-fab .wa-pulse {
  position: absolute;
  inset: -2px;
  border-radius: 999px;
  border: 2px solid #25d366;
  animation: wa-pulse 2.2s ease-out infinite;
  pointer-events: none;
}
@keyframes wa-pulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.3); opacity: 0; }
}

/* ─────────────── Hero ─────────────── */
.hero {
  position: relative;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  align-items: center;
  gap: 40px;
  padding: 140px 0 60px;
  perspective: 1400px;
}
@media (max-width: 1024px) {
  .hero { grid-template-columns: 1fr; padding-top: 120px; }
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 8px 10px;
  background: rgba(252, 208, 41, 0.08);
  border: 0.5px solid rgba(252, 208, 41, 0.25);
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--signal);
  width: fit-content;
  margin-bottom: 28px;
}
.hero-eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--signal);
  box-shadow: 0 0 8px var(--signal);
  animation: pulse 2s infinite;
}

.hero-headline {
  font-size: clamp(40px, 5.6vw, 84px);
  letter-spacing: -0.045em;
  font-weight: 500;
  margin-bottom: 28px;
  max-width: 900px;
}
.hero-headline .word {
  display: inline-block;
  margin-right: 0.18em;
  transform-style: preserve-3d;
}
.hero-headline .accent {
  font-style: italic;
  font-family: 'Space Grotesk', serif;
  color: var(--signal);
  font-weight: 400;
}
.hero-headline .strike {
  position: relative;
  color: rgba(245, 245, 240, 0.35);
}
.hero-headline .strike::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 55%;
  height: 4px;
  background: var(--signal);
  transform: scaleX(0);
  transform-origin: left;
  animation: strike-in 1.2s 0.6s cubic-bezier(0.7, 0, 0.3, 1) forwards;
}
@keyframes strike-in { to { transform: scaleX(1); } }

.hero-sub {
  max-width: 560px;
  font-size: 17px;
  line-height: 1.55;
  color: rgba(245, 245, 240, 0.65);
  margin-bottom: 36px;
}
.hero-sub strong { color: var(--paper); font-weight: 600; }

.hero-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px 14px 24px;
  background: var(--signal);
  color: var(--ink);
  border-radius: 999px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.01em;
  text-decoration: none;
  border: 0;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.3, 0.7, 0.4, 1), box-shadow 0.25s;
  box-shadow: 0 0 0 0 rgba(252, 208, 41, 0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(252, 208, 41, 0.4);
}
.btn-primary .arrow {
  display: inline-flex;
  width: 22px; height: 22px;
  align-items: center;
  justify-content: center;
  background: var(--ink);
  color: var(--signal);
  border-radius: 50%;
  font-size: 11px;
  transition: transform 0.25s;
}
.btn-primary:hover .arrow { transform: translateX(3px); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  background: rgba(255, 255, 255, 0.04);
  color: var(--paper);
  border: 0.5px solid rgba(255, 255, 255, 0.15);
  border-radius: 999px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: 14px;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--signal);
  color: var(--signal);
}

/* Hero portrait — yellow split */
.hero-portrait {
  position: relative;
  aspect-ratio: 1 / 1;
  max-width: 520px;
  margin-left: auto;
  perspective: 1200px;
  transform-style: preserve-3d;
}

.hero-portrait-frame {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  animation: gentle-float 6s ease-in-out infinite;
}
@keyframes gentle-float {
  0%, 100% { transform: translateY(0) rotateY(0deg); }
  50% { transform: translateY(-12px) rotateY(2deg); }
}

.hero-portrait-bg {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-radius: 24px;
  overflow: hidden;
  transform: translateZ(-30px);
}
.hero-portrait-bg-l {
  background: linear-gradient(180deg, #f5f5f0, #e0e0d8);
}
.hero-portrait-bg-r {
  background: linear-gradient(180deg, var(--signal), var(--signal-deep));
  position: relative;
}
.hero-portrait-bg-r::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0,0,0,0.08) 1px, transparent 1px);
  background-size: 14px 14px;
}

.hero-portrait-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center bottom;
  filter: drop-shadow(0 24px 60px rgba(0,0,0,0.5));
  transform: translateZ(20px);
}

.hero-portrait-tag {
  position: absolute;
  z-index: 5;
  padding: 10px 14px;
  background: rgba(10, 11, 16, 0.85);
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--paper);
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.hero-portrait-tag .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--signal);
  box-shadow: 0 0 8px var(--signal);
}
.hero-portrait-tag-1 {
  top: 10%;
  left: 2%;
  transform: translateZ(60px);
  animation: tag-float-a 5s ease-in-out infinite;
  border-color: rgba(252, 208, 41, 0.45);
  background: rgba(10, 11, 16, 0.92);
}
.hero-portrait-tag-2 {
  top: 36%;
  left: 0%;
  transform: translateZ(80px);
  animation: tag-float-b 6s ease-in-out infinite;
  border-color: rgba(252, 208, 41, 0.45);
  background: rgba(10, 11, 16, 0.92);
}
.hero-portrait-tag-3 {
  bottom: 22%;
  left: 4%;
  transform: translateZ(40px);
  animation: tag-float-c 7s ease-in-out infinite;
  border-color: rgba(252, 208, 41, 0.45);
  background: rgba(10, 11, 16, 0.92);
}
@keyframes tag-float-a {
  0%, 100% { transform: translateZ(60px) translateY(0); }
  50% { transform: translateZ(60px) translateY(-10px); }
}
@keyframes tag-float-b {
  0%, 100% { transform: translateZ(80px) translateY(0); }
  50% { transform: translateZ(80px) translateY(-14px); }
}
@keyframes tag-float-c {
  0%, 100% { transform: translateZ(40px) translateY(0); }
  50% { transform: translateZ(40px) translateY(-8px); }
}

.hero-portrait-orbit {
  position: absolute;
  inset: -8%;
  border: 1px dashed rgba(252, 208, 41, 0.25);
  border-radius: 50%;
  animation: orbit-spin 30s linear infinite;
}
@keyframes orbit-spin {
  to { transform: rotate(360deg); }
}
.hero-portrait-orbit::before,
.hero-portrait-orbit::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  background: var(--signal);
  border-radius: 50%;
  box-shadow: 0 0 16px var(--signal);
  top: -6px;
  left: 50%;
}
.hero-portrait-orbit::after { top: auto; bottom: -6px; opacity: 0.5; }

.hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line);
  border-top: 0.5px solid var(--line);
  border-bottom: 0.5px solid var(--line);
  margin-top: 40px;
  grid-column: 1 / -1;
}
.hero-stat {
  background: var(--navy-deep);
  padding: 22px 24px;
}
.hero-stat-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 38px;
  font-weight: 500;
  letter-spacing: -0.03em;
  color: var(--paper);
  margin-bottom: 4px;
}
.hero-stat-num .unit { color: var(--signal); }
.hero-stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--mute);
}
@media (max-width: 768px) {
  .hero-stats { grid-template-columns: repeat(2, 1fr); }
}

/* ─────────────── Sections common ─────────────── */
.section {
  position: relative;
  padding: 100px 0;
}

.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--signal);
  margin-bottom: 24px;
}
.section-eyebrow .num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  background: rgba(252, 208, 41, 0.1);
  border: 0.5px solid rgba(252, 208, 41, 0.3);
  border-radius: 4px;
  font-size: 10px;
}

.section-title {
  font-size: clamp(34px, 4.6vw, 60px);
  letter-spacing: -0.035em;
  margin-bottom: 24px;
  max-width: 900px;
}
.section-title em {
  font-style: italic;
  color: var(--signal);
  font-weight: 400;
}

.section-lede {
  max-width: 640px;
  font-size: 16px;
  line-height: 1.6;
  color: rgba(245, 245, 240, 0.65);
  margin-bottom: 56px;
}

/* ─────────────── About / Philosophy with smoke portrait ─────────────── */
.about-wrap {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 56px;
  align-items: center;
}
@media (max-width: 1024px) {
  .about-wrap { grid-template-columns: 1fr; gap: 32px; }
}

.about-portrait {
  position: relative;
  aspect-ratio: 4/5;
  max-width: 460px;
  border-radius: 24px;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(252, 208, 41, 0.15), transparent 60%),
    linear-gradient(180deg, var(--navy-mid) 0%, var(--navy-deep) 100%);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
}
.about-portrait::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(252, 208, 41, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(252, 208, 41, 0.06) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 100%);
}
.about-portrait img {
  position: relative;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center bottom;
  z-index: 2;
  filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
}

.about-portrait-glow {
  position: absolute;
  bottom: -10%;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 30%;
  background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(252, 208, 41, 0.4), transparent 70%);
  filter: blur(30px);
  z-index: 1;
}

.about-credentials {
  position: absolute;
  z-index: 5;
  padding: 12px 16px;
  background: rgba(10, 11, 16, 0.85);
  border: 0.5px solid rgba(252, 208, 41, 0.3);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--paper);
  line-height: 1.4;
}
.about-credentials b { color: var(--signal); font-weight: 500; }
.about-cred-1 { top: 8%; right: -12%; max-width: 180px; }
.about-cred-2 { bottom: 12%; left: -10%; max-width: 200px; }

.about-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-top: 32px;
}
.about-list-item {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 16px;
  align-items: start;
}
.about-list-item .num {
  font-family: 'Space Grotesk', sans-serif;
  font-style: italic;
  color: var(--signal);
  font-size: 22px;
  line-height: 1;
}
.about-list-item h4 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.about-list-item p {
  font-size: 14px;
  color: var(--mute);
  line-height: 1.55;
}

/* ─────────────── Glass card baseline ─────────────── */
.glass {
  position: relative;
  background: linear-gradient(180deg,
    rgba(255, 255, 255, 0.04) 0%,
    rgba(255, 255, 255, 0.02) 100%);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow: hidden;
}
.glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 0.5px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 40%);
  -webkit-mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

/* ─────────────── SXO/AIO Lab ─────────────── */
.lab-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;

.lab-card { padding: 28px; }
.lab-card-eyebrow {

/* ─────────────── Experience timeline ─────────────── */
.timeline {
  position: relative;
  padding-left: 28px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 8px; bottom: 8px;

  background: linear-gradient(180deg, var(--signal), rgba(252, 208, 41, 0.1));
}
.timeline-row {
  position: relative;
  padding: 18px 0;

  .timeline-row { grid-template-columns: 1fr; gap: 6px; }
}
.timeline-row::before {
  content: '';
  position: absolute;
  left: -28px;
  top: 24px;
  width: 13px; height: 13px;
  background: var(--signal);
  border: 2px solid var(--navy-deep);
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(252, 208, 41, 0.5);
}
.timeline-role {

  padding: 96px 56px;
  text-align: center;
  border-radius: 32px;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 100% at 50% 0%, rgba(252, 208, 41, 0.18), transparent 60%),
    linear-gradient(180deg, rgba(10, 22, 40, 0.6), rgba(0, 0, 0, 0.4));

}
@media (max-width: 768px) { .cta-block { padding: 64px 24px; } }
.cta-block::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(180deg, rgba(252, 208, 41, 0.4), transparent 50%);
  -webkit-mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.cta-eyebrow {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--signal);
  margin-bottom: 32px;
  padding: 8px 16px;
  background: rgba(252, 208, 41, 0.08);
  border: 0.5px solid rgba(252, 208, 41, 0.3);

}
.cta-title {
  font-size: clamp(40px, 5.6vw, 80px);
  letter-spacing: -0.04em;

  margin-right: auto;
}
.cta-title em { font-style: italic; color: var(--signal); font-weight: 400; }

  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mute);
}
.cta-contact-item .v {

  margin-top: 80px;
}
.footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;

  font-weight: 600;

  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}

  font-size: 11px;

  letter-spacing: 0.04em;

/* ─────────────── Reveal animation ─────────────── */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1), transform 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
}
.reveal.in { opacity: 1; transform: translateY(0); }

/* ─────────────── Marquee ─────────────── */
.marquee {
  position: relative;
  overflow: hidden;
  padding: 24px 0;
  border-top: 0.5px solid var(--line);
  border-bottom: 0.5px solid var(--line);
  margin: 60px 0;
  background: rgba(0, 0, 0, 0.3);
}
.marquee-track {
  display: flex;
  gap: 56px;

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
// Neural network particle background — canvas, connected nodes, parallax-aware
function NeuralBackground({ density = 0.6, intensity = 1 }) {
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const mouseRef = React.useRef({ x: 0.5, y: 0.5 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w = 0, h = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);

    const resize = () => {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);
    };
    resize();

    // Build node grid based on density
    const targetCount = Math.floor((w * h) / 18000 * density);
    const nodes = Array.from({ length: targetCount }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      r: Math.random() * 1.4 + 0.6,
      pulse: Math.random() * Math.PI * 2,
      isHub: Math.random() < 0.08,
    }));

    const onMouse = (e) => {
      mouseRef.current = { x: e.clientX, y: e.clientY };
    };
    window.addEventListener('mousemove', onMouse);
    window.addEventListener('resize', resize);

    let t = 0;
    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      t += 0.008;

      const mx = mouseRef.current.x;
      const my = mouseRef.current.y;

      // Draw connections first
      const linkDist = 140;
      ctx.lineWidth = 0.5;
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < linkDist) {
            const alpha = (1 - d / linkDist) * 0.18 * intensity;
            // mouse proximity glow
            const cx = (a.x + b.x) / 2;
            const cy = (a.y + b.y) / 2;
            const mdx = cx - mx, mdy = cy - my;
            const md = Math.sqrt(mdx * mdx + mdy * mdy);
            const mouseBoost = md < 200 ? (1 - md / 200) * 0.7 : 0;
            const isYellow = a.isHub || b.isHub || mouseBoost > 0.1;
            ctx.strokeStyle = isYellow
              ? `rgba(252, 208, 41, ${alpha + mouseBoost * 0.6})`
              : `rgba(180, 200, 230, ${alpha * 0.6})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // Draw nodes
      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        n.pulse += 0.02;

        // Mouse repulsion (very subtle)
        const mdx = n.x - mx;
        const mdy = n.y - my;
        const md = Math.sqrt(mdx * mdx + mdy * mdy);
        if (md < 120 && md > 0.1) {
          n.x += (mdx / md) * 0.4;
          n.y += (mdy / md) * 0.4;
        }

        // Wrap edges
        if (n.x < -10) n.x = w + 10;
        if (n.x > w + 10) n.x = -10;
        if (n.y < -10) n.y = h + 10;
        if (n.y > h + 10) n.y = -10;

        const r = n.r * (1 + Math.sin(n.pulse) * 0.2);
        if (n.isHub) {
          // Glowing hub node
          const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 8);
          grad.addColorStop(0, 'rgba(252, 208, 41, 0.7)');
          grad.addColorStop(0.4, 'rgba(252, 208, 41, 0.15)');
          grad.addColorStop(1, 'rgba(252, 208, 41, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(n.x, n.y, r * 8, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = '#fcd029';
          ctx.beginPath();
          ctx.arc(n.x, n.y, r * 1.6, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = `rgba(220, 230, 245, ${0.5 * intensity})`;
          ctx.beginPath();
          ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();

    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('mousemove', onMouse);
      window.removeEventListener('resize', resize);
    };
  }, [density, intensity]);

  return <canvas ref={canvasRef} className="neural-bg" />;
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Hero — kinetic 3D headline + portrait with yellow split + 3D tilt

function HeroPortrait() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = (e.clientX - cx) / (r.width / 2);
      const dy = (e.clientY - cy) / (r.height / 2);
      el.style.transform = `rotateY(${dx * 6}deg) rotateX(${-dy * 6}deg)`;
    };
    const onLeave = () => { el.style.transform = ''; };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseleave', onLeave);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseleave', onLeave);
    };
  }, []);
  return (
    <div className="hero-portrait">
      <div className="hero-portrait-orbit"></div>
      <div ref={ref} className="hero-portrait-frame" style={{ transition: 'transform 0.3s ease-out' }}>
        <div className="hero-portrait-bg">

function KineticHeadline({ intensity }) {

      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = (e.clientX - cx) / r.width;
      const dy = (e.clientY - cy) / r.height;
      const max = 5 * intensity;
      el.style.transform = `rotateX(${-dy * max}deg) rotateY(${dx * max}deg)`;
    };
    window.addEventListener('mousemove', onMove);
    return () => window.removeEventListener('mousemove', onMove);
  }, [intensity]);
  return (
    <h1 ref={ref} className="display hero-headline"
        style={{ transformStyle: 'preserve-3d', transition: 'transform 0.2s ease-out' }}>
      <span className="word strike">Algorithms</span>{' '}

}

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) { els.forEach((e) => e.classList.add('in')); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });
    els.forEach((e) => io.observe(e));
    return () => io.disconnect();
  }, []);
}

function useActiveSection() {
  const [active, setActive] = React.useState('hero');
  React.useEffect(() => {
    const ids = ['hero', 'about', 'services', 'lab', 'automation', 'ventures', 'psych', 'skills', 'experience', 'certs', 'contact'];
    const onScroll = () => {
      const y = window.scrollY + window.innerHeight * 0.4;
      let cur = 'hero';
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return [active, setActive];
}
